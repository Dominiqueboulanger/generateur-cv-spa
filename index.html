<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Assistant CV SPE Professionnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #3498db; --bg: #f4f7f6; --text: #2c3e50; --green: #27ae60; --orange: #e67e22; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; gap: 20px; color: var(--text); }
        .form-side { width: 40%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: 95vh; overflow-y: auto; }
        .preview-side { width: 60%; background: #525659; padding: 20px; display: flex; justify-content: center; height: 95vh; overflow-y: auto; border-radius: 8px; }
        #cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 12mm; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.5); font-size: 11pt; line-height: 1.3; }
        h2 { font-size: 1.1em; color: var(--blue); border-bottom: 2px solid var(--blue); margin: 15px 0 8px 0; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.9em; }
        .input-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .input-group input { margin-bottom: 0; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 0 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 0.9em; transition: 0.2s; }
        .btn-print { background: var(--green); grid-column: span 2; font-size: 1.1em; padding: 15px; }
        .btn-save { background: var(--blue); }
        .btn-load { background: var(--orange); }
        .tag { background: #e1f0fa; color: var(--blue); padding: 3px 10px; border-radius: 15px; font-size: 10px; margin: 2px; display: inline-flex; align-items: center; border: 1px solid var(--blue); }
        .tag b { margin-left: 6px; cursor: pointer; color: #e74c3c; }
        @media print { .no-print { display: none !important; } body { padding: 0; background: white; display: block; } .preview-side { background: white; padding: 0; width: 100%; height: auto; overflow: visible; } #cv-paper { box-shadow: none; margin: 0; width: 100%; height: 297mm; padding: 10mm; font-size: 10pt; } }
    </style>
</head>
<body>

<div class="form-side no-print">
    <h2 style="margin-top:0;">👤 État Civil & Photo</h2>
    <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(event)">
    <input type="text" id="nom" placeholder="PRÉNOM NOM" oninput="update()">
    <div class="grid"><input type="text" id="tel" placeholder="Téléphone" oninput="update()"><input type="text" id="email" placeholder="Email" oninput="update()"></div>
    <textarea id="adresse" placeholder="Adresse" oninput="update()"></textarea>

    <h2>🎯 Métier & Accroche</h2>
    <select id="metier" onchange="loadSkills()">
        <option value="">-- Choisir le métier --</option>
        <option value="Garde d'enfants">Garde d'enfants</option>
        <option value="ADVD">Assistant de Vie (ADVD)</option>
        <option value="Employé Familial">Employé Familial</option>
    </select>
    <textarea id="profil" placeholder="Phrase d'accroche..." oninput="update()"></textarea>

    <h2>🛠️ Compétences Techniques</h2>
    <select id="selTech" onchange="addTag('tech', this)"></select>
    <div class="input-group">
        <input type="text" id="customTech" placeholder="Ou tapez une autre compétence...">
        <button class="btn-add" onclick="addCustomTag('tech')">+</button>
    </div>
    <div id="tagsTech" style="margin-bottom:10px;"></div>

    <h2>🤝 Qualités Humaines</h2>
    <select id="selHum" onchange="addTag('hum', this)"></select>
    <div class="input-group">
        <input type="text" id="customHum" placeholder="Ou tapez une autre qualité...">
        <button class="btn-add" onclick="addCustomTag('hum')">+</button>
    </div>
    <div id="tagsHum" style="margin-bottom:10px;"></div>

    <h2>💼 Expériences (3 max)</h2>
    <div id="exp-inputs">
        <input type="text" class="exp-in" placeholder="Poste | Entreprise | Dates" oninput="update()">
        <input type="text" class="exp-in" placeholder="Poste | Entreprise | Dates" oninput="update()">
        <input type="text" class="exp-in" placeholder="Poste | Entreprise | Dates" oninput="update()">
    </div>

    <h2>🎓 Formations (3 max)</h2>
    <div id="edu-inputs">
        <input type="text" class="edu-in" placeholder="Diplôme | École | Année" oninput="update()">
        <input type="text" class="edu-in" placeholder="Diplôme | École | Année" oninput="update()">
        <input type="text" class="edu-in" placeholder="Diplôme | École | Année" oninput="update()">
    </div>

    <h2>🎨 Centres d'intérêt</h2>
    <input type="text" id="interets" placeholder="Loisirs, bénévolat..." oninput="update()">

    <div class="btn-zone">
        <button class="btn btn-save" onclick="saveData()">💾 Sauvegarder brouillon</button>
        <button class="btn btn-load" onclick="document.getElementById('load-file').click()">📂 Reprendre brouillon</button>
        <input type="file" id="load-file" style="display:none" accept=".json" onchange="loadData(event)">
        <button class="btn btn-print" onclick="window.print()">🖨️ GÉNÉRER LE PDF (A4)</button>
    </div>
</div>

<div class="preview-side">
    <div id="cv-paper"></div>
</div>

<script>
    let repoData = {};
    let selectedSkills = { tech: [], hum: [] };
    let photoData = "";
    const FILE_NAME = 'competences_SPE_par_metier.json';

    async function init() {
        try {
            const response = await fetch(FILE_NAME + '?v=' + Date.now());
            repoData = await response.json();
        } catch(e) { console.error("Erreur JSON"); }
        update();
    }

    function handlePhoto(e) {
        const reader = new FileReader();
        reader.onload = () => { photoData = reader.result; update(); };
        reader.readAsDataURL(e.target.files[0]);
    }

    function loadSkills() {
        const m = document.getElementById('metier').value;
        const sT = document.getElementById('selTech');
        const sH = document.getElementById('selHum');
        sT.innerHTML = sH.innerHTML = '<option value="">-- Sélectionner dans la liste --</option>';
        if(m && repoData[m]) {
            repoData[m].Techniques.forEach(t => sT.innerHTML += `<option value="${t}">${t}</option>`);
            repoData[m].Humaines.forEach(h => sH.innerHTML += `<option value="${h}">${h}</option>`);
        }
        update();
    }

    function addTag(type, el) {
        if(el.value && !selectedSkills[type].includes(el.value)) {
            selectedSkills[type].push(el.value);
            update();
        }
        el.value = "";
    }

    function addCustomTag(type) {
        const inputId = type === 'tech' ? 'customTech' : 'customHum';
        const val = document.getElementById(inputId).value.trim();
        if(val && !selectedSkills[type].includes(val)) {
            selectedSkills[type].push(val);
            document.getElementById(inputId).value = "";
            update();
        }
    }

    function saveData() {
        const fullData = {
            nom: document.getElementById('nom').value, tel: document.getElementById('tel').value,
            email: document.getElementById('email').value, adresse: document.getElementById('adresse').value,
            metier: document.getElementById('metier').value, profil: document.getElementById('profil').value,
            interets: document.getElementById('interets').value, tech: selectedSkills.tech, hum: selectedSkills.hum,
            exp: Array.from(document.querySelectorAll('.exp-in')).map(i => i.value),
            edu: Array.from(document.querySelectorAll('.edu-in')).map(i => i.value), photo: photoData
        };
        const blob = new Blob([JSON.stringify(fullData)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `cv_${fullData.nom.replace(/\s/g, '_') || 'brouillon'}.json`; a.click();
    }

    function loadData(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const d = JSON.parse(e.target.result);
            document.getElementById('nom').value = d.nom || ''; document.getElementById('tel').value = d.tel || '';
            document.getElementById('email').value = d.email || ''; document.getElementById('adresse').value = d.adresse || '';
            document.getElementById('metier').value = d.metier || ''; document.getElementById('profil').value = d.profil || '';
            document.getElementById('interets').value = d.interets || '';
            selectedSkills.tech = d.tech || []; selectedSkills.hum = d.hum || [];
            photoData = d.photo || '';
            const expIn = document.querySelectorAll('.exp-in'); d.exp.forEach((val, i) => { if(expIn[i]) expIn[i].value = val; });
            const eduIn = document.querySelectorAll('.edu-in'); d.edu.forEach((val, i) => { if(eduIn[i]) eduIn[i].value = val; });
            loadSkills(); update();
        };
        reader.readAsText(event.target.files[0]);
    }

    function update() {
        const paper = document.getElementById('cv-paper');
        const experiences = Array.from(document.querySelectorAll('.exp-in')).map(i => i.value).filter(v => v);
        const formations = Array.from(document.querySelectorAll('.edu-in')).map(i => i.value).filter(v => v);

        paper.innerHTML = `
            <div style="display:flex; align-items:center; border-bottom:3px solid #3498db; padding-bottom:15px; margin-bottom:15px;">
                ${photoData ? `<img src="${photoData}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-right:20px; border:2px solid #3498db;">` : ''}
                <div style="flex:1;">
                    <h1 style="margin:0; text-transform:uppercase; font-size:1.8em;">${document.getElementById('nom').value || 'PRÉNOM NOM'}</h1>
                    <p style="margin:2px 0; font-size:0.9em; color:#555;">${document.getElementById('tel').value} | ${document.getElementById('email').value}</p>
                    <p style="margin:0; font-size:0.8em;">${document.getElementById('adresse').value}</p>
                </div>
            </div>
            <div style="background:#3498db; color:white; padding:6px 15px; display:inline-block; border-radius:4px; font-weight:bold; margin-bottom:15px;">${document.getElementById('metier').value || 'MÉTIER'}</div>
            <p style="font-style:italic; border-left:3px solid #3498db; padding-left:10px; margin-bottom:15px; font-size:0.95em;">${document.getElementById('profil').value}</p>
            <div class="grid">
                <div><h2>Compétences</h2><ul style="padding-left:15px; font-size:0.85em;">${selectedSkills.tech.map(t => `<li>${t}</li>`).join('')}</ul></div>
                <div><h2>Qualités</h2><div style="display:flex; flex-wrap:wrap; gap:5px;">${selectedSkills.hum.map(h => `<span style="border:1px solid #ddd; padding:3px 8px; border-radius:4px; font-size:0.8em;">${h}</span>`).join('')}</div></div>
            </div>
            <h2>Expériences Professionnelles</h2><div style="font-size:0.9em;">${experiences.map(e => `<div>• ${e}</div>`).join('')}</div>
            <h2>Formations</h2><div style="font-size:0.9em;">${formations.map(f => `<div>• ${f}</div>`).join('')}</div>
            ${document.getElementById('interets').value ? `<h2>Centres d'intérêt</h2><p style="font-size:0.9em;">${document.getElementById('interets').value}</p>` : ''}
        `;
        document.getElementById('tagsTech').innerHTML = selectedSkills.tech.map(t => `<span class="tag">${t}<b onclick="selectedSkills.tech=selectedSkills.tech.filter(x=>x!=='${t}');update()">✕</b></span>`).join('');
        document.getElementById('tagsHum').innerHTML = selectedSkills.hum.map(h => `<span class="tag">${h}<b onclick="selectedSkills.hum=selectedSkills.hum.filter(x=>x!=='${h}');update()">✕</b></span>`).join('');
    }
    window.onload = init;
</script>
</body>
</html>
