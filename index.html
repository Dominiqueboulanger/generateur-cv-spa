<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant CV SAP Professionnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --secondary: #95a5a6; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 4px solid var(--primary); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.85em; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        .btn { border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-dark { background: var(--dark); }
        .btn-secondary { background: var(--secondary); }
        .btn-danger { background: var(--danger); font-size: 0.8em; padding: 5px 10px; }
        .tag { background: #e1f0fa; color: var(--primary); padding: 5px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; margin: 3px; font-size: 12px; border: 1px solid var(--primary); font-weight: 600; }
        .block-item { border-left: 3px solid #ddd; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        .flex-add { display: flex; gap: 10px; margin-bottom: 10px; }
        #photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; border: 2px solid var(--primary); margin-top: 5px; }
        .action-zone { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 15px; margin-top: 30px; }

        /* Styles d'impression et de mise en page du CV */
        #cv-to-print { display: none; }

        @media print {
            .no-print { display: none !important; }
            @page { margin: 0; size: A4; }
            body { margin: 0; padding: 0; background: white; }
            #cv-to-print {
                display: block !important;
                width: 210mm;
                height: 297mm;
                padding: 12mm;
                background: white;
                box-sizing: border-box;
                overflow: hidden;
                position: relative;
            }
            .cv-content-wrapper { transform-origin: top left; }
            .badge-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
            .badge { background: white !important; border: 1px solid #ddd !important; padding: 3px 8px; border-radius: 6px; font-size: 0.8em; color: #333; }
            h2 { color: #3498db !important; border-bottom: 2px solid #3498db; text-transform: uppercase; font-size: 1.05em; margin-top: 15px; margin-bottom: 8px; padding-bottom: 3px; }
            .metier-tag { background: #3498db !important; color: white !important; padding: 5px 15px; border-radius: 4px; font-weight: bold; display: inline-block; margin-bottom: 8px; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <header style="margin-bottom:20px; text-align: center;">
        <h1 style="color: var(--dark); margin-bottom: 5px;">Mon Assistant CV SAP</h1>
        <p style="color: #7f8c8d; font-size: 0.9em;">Génération de CV sur une seule page</p>
    </header>

    <div class="card">
        <label>👤 État Civil</label>
        <div class="grid-2">
            <div><input type="file" accept="image/*" onchange="handlePhoto(event)"><img id="photo-preview"></div>
            <input type="text" id="nom" placeholder="NOM Prénom" oninput="saveData()">
        </div>
        <div class="grid-2">
            <input type="text" id="tel" placeholder="Téléphone" oninput="saveData()">
            <input type="email" id="email" placeholder="Email" oninput="saveData()">
        </div>
        <textarea id="adresse" placeholder="Adresse complète" oninput="saveData()"></textarea>
    </div>

    <div class="card">
        <label>🎯 Métier visé</label>
        <select id="select-metier" onchange="changerMetier()">
            <option value="">-- Sélectionnez votre métier --</option>
            <option value="Garde">Assistant parental (garde d’enfants)</option>
            <option value="ADVD">Assistant de vie dépendance (ADVD)</option>
            <option value="EF">Employé familial (EF)</option>
        </select>
        <textarea id="profil" oninput="saveData()" placeholder="Accroche professionnelle..."></textarea>
    </div>

    <div class="card">
        <label>💼 Expériences Professionnelles</label>
        <div id="container-exp"></div>
        <button class="btn btn-primary" onclick="ajouterExperience()">+ Ajouter une expérience</button>
    </div>

    <div class="card">
        <label>🛠️ Compétences Techniques</label>
        <select id="list-comp-suggest" onchange="ajouterItem('compTech', 'list-comp-suggest')"></select>
        <div class="flex-add">
            <input type="text" id="custom-comp" placeholder="Autre compétence...">
            <button class="btn btn-dark" onclick="ajouterLibre('compTech', 'custom-comp')">OK</button>
        </div>
        <div id="container-compTech"></div>
        <hr style="margin:15px 0; border:0; border-top:1px solid #eee;">
        <label>🤝 Qualités & Savoir-être</label>
        <select id="list-hum-suggest" onchange="ajouterItem('compHum', 'list-hum-suggest')">
            <option value="">-- Ajouter une qualité --</option>
            <option value="Empathie et écoute">Empathie et écoute</option>
            <option value="Patience et adaptabilité">Patience et adaptabilité</option>
            <option value="Discrétion">Discrétion</option>
            <option value="Ponctualité">Ponctualité</option>
            <option value="Sens de l'organisation">Sens de l'organisation</option>
        </select>
        <div id="container-compHum"></div>
    </div>

    <div class="card">
        <label>🎓 Formations & Diplômes</label>
        <div id="container-formations"></div>
        <button class="btn btn-primary" onclick="ajouterFormation()">+ Ajouter une formation</button>
    </div>

    <div class="card">
        <label>🎨 Centres d'intérêt</label>
        <textarea id="loisirs" oninput="saveData()" placeholder="Loisirs..."></textarea>
    </div>

    <div class="action-zone">
        <button class="btn btn-secondary" onclick="exporterJSON()">💾 Sauvegarder .json</button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📂 Charger .json</button>
        <input type="file" id="importFile" style="display:none" onchange="importerJSON(event)">
        <button class="btn btn-success" onclick="preparerEtImprimer()">🖨️ GÉNÉRER LE CV (1 PAGE)</button>
    </div>
</div>

<div id="cv-to-print"></div>

<script>
    const baseMetiers = {
        "Garde": {
            comp: [
                "Préparer un biberon en respectant les doses et l’hygiène.", "Changer une couche en suivant les étapes d’hygiène de base.",
                "Habiller un enfant en adaptant les vêtements à la météo.", "Donner un bain à un bébé sous supervision.",
                "Stériliser les biberons et les tétines.", "Organiser des jeux adaptés à l’âge de l’enfant.",
                "Réchauffer un repas pour enfant en respectant les consignes de sécurité.", "Les Gestes qui sauvent (certificat SST obtenu)",
                "Installer un enfant dans un siège auto ou une poussette.", "Reconnaître les signes de fatigue ou de faim chez un enfant.",
                "Désinfecter les jouets et les surfaces de jeu."
            ],
            mat: [
                "1. Multi-emploi – Maîtrise et gestion de sa carrière", "2. Prévention et premiers secours au domicile",
                "3. Gestion du domicile, entretien écoresponsable", "4. Formation complète pour l’accompagnement individualisé de l’enfant",
                "5. Accompagner l’enfant dans son voyage d’apprentissages", "6. Cultiver le savoir de l’enfant par le jeu et la créativité",
                "7. Approche globale de l’alimentation – de la petite enfance à l’adolescence", "8. Inclusion active et accompagnement adapté aux besoins spécifiques"
            ]
        },
        "ADVD": {
            comp: [
                "Aider une personne à s’asseoir ou se lever d’un fauteuil en toute sécurité.", "Les Gestes qui sauvent (certificat SST obtenu)",
                "Servir un repas en respectant les consignes alimentaires (ex : mixé, coupé).", "Aider à enfiler ou retirer des vêtements adaptés.",
                "Installer un fauteuil roulant ou une canne de manière sécurisée.", "Rappeler à une personne de prendre ses médicaments à l’heure.",
                "Changer les draps d’un lit médicalisé avec aide.", "Aider à la toilette intime avec respect et discrétion.",
                "Prendre la température avec un thermomètre frontal.", "Stimuler une personne par des activités simples (ex : lecture, musique).",
                "Utiliser un déambulateur ou une aide technique pour la marche."
            ],
            mat: [
                "1. Multi-emploi – Maîtrise et gestion de sa carrière", "2. Prévention et premiers secours au domicile",
                "3. Gestion du domicile, entretien écoresponsable", "4. Vieillissement et dépendance",
                "5. Accompagnement quotidien des adultes en perte d'autonomie", "6. Accompagnement holistique et activités épanouissantes",
                "7. Nutrition sénior : Cuisine sur mesure, équilibre et assistance", "8. Inclusion active et accompagnement adapté (personnes âgées/handicap)",
                "9. Unis dans l'action: Coordonner, organiser et collaborer", "10. Approche globale de l'accompagnement d'une personne âgée"
            ]
        },
        "EF": {
            comp: [
                "Passer l’aspirateur dans une pièce sans oublier les recoins.", "Laver et essorer le linge à la main ou en machine.",
                "Faire les lits en respectant les règles de propreté.", "Nettoyer les vitres avec un produit adapté.",
                "Préparer un repas simple (ex : salade, sandwich).", "Ranger les courses dans les placards ou le réfrigérateur.",
                "Utiliser un balai et une serpillière pour nettoyer le sol.", "Les Gestes qui sauvent (certificat SST obtenu)",
                "Repasser des vêtements avec un fer à repasser.", "Préparer une liste de courses pour la semaine.",
                "Utiliser un produit détartrant pour la salle de bain ou les WC."
            ],
            mat: [
                "1. Multi-emploi – Maîtrise et gestion de sa carrière", "2. Prévention et premiers secours au domicile",
                "3. Gestion du domicile, entretien écoresponsable", "4. Vieillissement et dépendance",
                "5. Accompagnement quotidien des adultes en perte d'autonomie", "6. Accompagnement holistique et activités épanouissantes",
                "7. Nutrition sénior : Cuisine sur mesure, équilibre et assistance", "8. Inclusion active et accompagnement adapté (personnes âgées/handicap)",
                "9. Unis dans l'action: Coordonner, organiser et collaborer", "10. Approche globale de l'accompagnement d'une personne âgée"
            ]
        }
    };

    let userData = { nom: "", tel: "", email: "", adresse: "", profil: "", loisirs: "", compTech: [], compHum: [], formations: [], photoData: "", experiences: [] };

    function checkDataIntegrity() {
        if (!Array.isArray(userData.formations)) userData.formations = [];
        if (!Array.isArray(userData.experiences)) userData.experiences = [];
        if (!Array.isArray(userData.compTech)) userData.compTech = [];
        if (!Array.isArray(userData.compHum)) userData.compHum = [];
    }

    function changerMetier() {
        const m = document.getElementById('select-metier').value;
        const compSelect = document.getElementById('list-comp-suggest');
        compSelect.innerHTML = '<option value="">-- Choisir une compétence --</option>';
        if(m && baseMetiers[m]) {
            baseMetiers[m].comp.forEach(c => compSelect.innerHTML += `<option value="${c}">${c}</option>`);
        }
        renderFormations();
        saveData();
    }

    function ajouterExperience() {
        checkDataIntegrity();
        userData.experiences.push({ titre: "", dates: "", missions: "" });
        renderExperiences();
        saveData();
    }

    function renderExperiences() {
        const container = document.getElementById('container-exp');
        container.innerHTML = userData.experiences.map((exp, i) => `
            <div class="block-item">
                <input type="text" placeholder="Poste" value="${exp.titre || ''}" oninput="userData.experiences[${i}].titre=this.value; saveData()">
                <input type="text" placeholder="Dates" value="${exp.dates || ''}" oninput="userData.experiences[${i}].dates=this.value; saveData()">
                <textarea placeholder="Missions..." oninput="userData.experiences[${i}].missions=this.value; saveData()">${exp.missions || ''}</textarea>
                <button class="btn btn-danger" onclick="userData.experiences.splice(${i},1); renderExperiences(); saveData()">Supprimer</button>
            </div>
        `).join('');
    }

    function ajouterFormation() {
        checkDataIntegrity();
        userData.formations.push({ diplome: "", annee: "", matieres: [] });
        renderFormations();
        saveData();
    }

    function renderFormations() {
        checkDataIntegrity();
        const m = document.getElementById('select-metier').value;
        const container = document.getElementById('container-formations');
        container.innerHTML = userData.formations.map((f, i) => `
            <div class="block-item">
                <div class="grid-2">
                    <input type="text" placeholder="Diplôme" value="${f.diplome || ''}" oninput="userData.formations[${i}].diplome=this.value; saveData()">
                    <input type="text" placeholder="Année" value="${f.annee || ''}" oninput="userData.formations[${i}].annee=this.value; saveData()">
                </div>
                <select onchange="ajouterMatiereFormation(${i}, this)">
                    <option value="">-- Ajouter un module --</option>
                    ${m && baseMetiers[m] ? baseMetiers[m].mat.map(mat => `<option value="${mat}">${mat}</option>`).join('') : ''}
                </select>
                <div id="tags-matieres-${i}">
                    ${(f.matieres || []).map(mat => `<span class="tag">${mat} <b onclick="supprimerMatiere(${i}, '${mat}')" style="cursor:pointer;">✕</b></span>`).join('')}
                </div>
                <button class="btn btn-danger" onclick="userData.formations.splice(${i},1); renderFormations(); saveData()" style="margin-top:10px;">Supprimer formation</button>
            </div>
        `).join('');
    }

    function ajouterMatiereFormation(idx, select) {
        if(select.value && !userData.formations[idx].matieres.includes(select.value)) {
            userData.formations[idx].matieres.push(select.value);
            renderFormations();
            saveData();
        }
    }

    function supprimerMatiere(fIdx, mat) {
        userData.formations[fIdx].matieres = userData.formations[fIdx].matieres.filter(m => m !== mat);
        renderFormations();
        saveData();
    }

    function ajouterItem(type, selectId) {
        checkDataIntegrity();
        const val = document.getElementById(selectId).value;
        if(val && !userData[type].includes(val)) {
            userData[type].push(val);
            renderTags();
            saveData();
        }
    }

    function ajouterLibre(type, inputId) {
        checkDataIntegrity();
        const val = document.getElementById(inputId).value.trim();
        if(val && !userData[type].includes(val)) {
            userData[type].push(val);
            document.getElementById(inputId).value = "";
            renderTags();
            saveData();
        }
    }

    function renderTags() {
        checkDataIntegrity();
        ['compTech', 'compHum'].forEach(type => {
            document.getElementById('container-'+type).innerHTML = userData[type].map(t =>
                `<span class="tag">${t} <b onclick="userData['${type}'] = userData['${type}'].filter(i => i !== '${t}'); renderTags(); saveData()" style="cursor:pointer;">✕</b></span>`).join('');
        });
    }

    function handlePhoto(e) {
        const reader = new FileReader();
        reader.onload = () => { userData.photoData = reader.result; document.getElementById('photo-preview').src = reader.result; document.getElementById('photo-preview').style.display = 'block'; saveData(); };
        reader.readAsDataURL(e.target.files[0]);
    }

    function saveData() {
        const metierSel = document.getElementById('select-metier');
        const data = {
            nom: document.getElementById('nom').value,
            tel: document.getElementById('tel').value,
            email: document.getElementById('email').value,
            adresse: document.getElementById('adresse').value,
            metier: metierSel.options[metierSel.selectedIndex].text,
            profil: document.getElementById('profil').value,
            loisirs: document.getElementById('loisirs').value,
            userData: userData
        };
        // On synchronise userData pour être sûr que tout y est
        userData.nom = data.nom;
        userData.tel = data.tel;
        userData.email = data.email;
        userData.adresse = data.adresse;
        userData.profil = data.profil;
        userData.loisirs = data.loisirs;
        
        localStorage.setItem('cv_sap_vFinal', JSON.stringify(data));
    }

    function exporterJSON() {
        saveData();
        const blob = new Blob([localStorage.getItem('cv_sap_vFinal')], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        const name = document.getElementById('nom').value || "CV";
        a.download = `CV_${name}.json`;
        a.click();
    }

    function importerJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            if (!data.userData) data.userData = { formations: [], experiences: [], compTech: [], compHum: [] };
            localStorage.setItem('cv_sap_vFinal', JSON.stringify(data));
            location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    function preparerEtImprimer() {
        saveData();
        const o = JSON.parse(localStorage.getItem('cv_sap_vFinal'));
        const container = document.getElementById('cv-to-print');
        
        container.innerHTML = `
            <div class="cv-content-wrapper" id="cv-wrapper">
                <div style="display:flex; align-items:center; border-bottom:3px solid #3498db; padding-bottom:10px; margin-bottom:10px;">
                    ${o.userData.photoData ? `<img src="${o.userData.photoData}" style="width:85px; height:85px; border-radius:50%; margin-right:15px; object-fit:cover; border:2px solid #3498db;">` : ''}
                    <div>
                        <h1 style="margin:0; font-size:1.7em; color:#2c3e50;">${o.nom || 'NOM PRÉNOM'}</h1>
                        <div style="font-size:0.8em; color:#555;">📍 ${o.adresse || ''} | 📞 ${o.tel || ''} | ✉️ ${o.email || ''}</div>
                    </div>
                </div>
                <div class="metier-tag">${o.metier}</div>
                <div style="font-weight:700; border-left:4px solid #3498db; padding-left:12px; margin:10px 0; font-size:0.9em;">${o.profil}</div>
                
                <h2>Expériences Professionnelles</h2>
                ${(o.userData.experiences || []).map(e => `<div style="margin-bottom:8px;"><div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.9em;"><span>${e.titre}</span> <span>${e.dates}</span></div><div style="font-size:0.82em; color:#444;">${e.missions}</div></div>`).join('')}

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div><h2>Compétences</h2><div class="badge-container">${(o.userData.compTech || []).map(c => `<span class="badge">${c}</span>`).join('')}</div></div>
                    <div><h2>Qualités</h2><div class="badge-container">${(o.userData.compHum || []).map(c => `<span class="badge">${c}</span>`).join('')}</div></div>
                </div>

                <h2>Formation</h2>
                ${(o.userData.formations || []).map(f => `<div style="margin-bottom:8px;"><div style="font-size:0.9em;"><strong>${f.diplome}</strong> (${f.annee})</div><div class="badge-container">${(f.matieres || []).map(m => `<span class="badge" style="font-weight:600">${m}</span>`).join('')}</div></div>`).join('')}
                
                ${o.loisirs ? `<h2>Centres d'intérêt</h2><div style="font-size:0.82em; color:#444;">${o.loisirs}</div>` : ''}
            </div>
        `;

        // SCRIPT DE CALIBRAGE DYNAMIQUE (AUTO-SCALE)
        setTimeout(() => {
            const wrapper = document.getElementById('cv-wrapper');
            const targetHeight = 1000; // Hauteur max estimée en pixels pour un A4 avec marges
            const currentHeight = wrapper.offsetHeight;
            if (currentHeight > targetHeight) {
                const scale = targetHeight / currentHeight;
                wrapper.style.transform = `scale(${scale})`;
            }
            window.print();
        }, 300);
    }

    window.onload = () => {
        const saved = localStorage.getItem('cv_sap_vFinal');
        if(saved) {
            const o = JSON.parse(saved);
            userData = o.userData || userData;
            checkDataIntegrity();
            document.getElementById('nom').value = o.nom || "";
            document.getElementById('tel').value = o.tel || "";
            document.getElementById('email').value = o.email || "";
            document.getElementById('adresse').value = o.adresse || "";
            document.getElementById('profil').value = o.profil || "";
            document.getElementById('loisirs').value = o.loisirs || "";
            if(userData.photoData) { document.getElementById('photo-preview').src = userData.photoData; document.getElementById('photo-preview').style.display = 'block'; }
            const metierSelect = document.getElementById('select-metier');
            for(let i=0; i<metierSelect.options.length; i++) {
                if(metierSelect.options[i].text === o.metier) metierSelect.selectedIndex = i;
            }
            changerMetier(); renderExperiences(); renderFormations(); renderTags();
        }
    };
</script>
</body>
</html>
