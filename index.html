<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant CV SPE Professionnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; gap: 20px; }
        .editor-side { width: 45%; }
        .preview-side { width: 55%; position: sticky; top: 20px; height: fit-content; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 4px solid var(--primary); }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.85em; text-transform: uppercase; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        .btn { border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; width: 100%; font-size: 1em; background: var(--success); }
        .tag { background: #e1f0fa; color: var(--primary); padding: 5px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; margin: 3px; font-size: 11px; border: 1px solid var(--primary); }
        
        /* Aperçu type papier */
        #cv-preview { background: white; width: 210mm; min-height: 297mm; padding: 15mm; box-shadow: 0 0 20px rgba(0,0,0,0.1); transform: scale(0.5); transform-origin: top left; margin-bottom: -150mm; }
        
        @media print {
            .no-print { display: none !important; }
            body { padding: 0; background: white; }
            .container { display: block; }
            #cv-preview { transform: none; margin: 0; width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="editor-side">
        <div class="card">
            <label>👤 État Civil</label>
            <input type="text" id="nom" placeholder="PRÉNOM NOM" oninput="updateAll()">
            <input type="text" id="tel" placeholder="06 00 00 00 00" oninput="updateAll()">
            <input type="email" id="email" placeholder="contact@email.com" oninput="updateAll()">
            <textarea id="adresse" placeholder="Adresse" oninput="updateAll()"></textarea>
            <input type="file" accept="image/*" onchange="handlePhoto(event)">
        </div>

        <div class="card">
            <label>🎯 Métier & Accroche</label>
            <select id="select-metier" onchange="changerMetier()">
                <option value="">-- Choisir un métier --</option>
                <option value="Garde d'enfants">Garde d'enfants</option>
                <option value="ADVD">Assistant de Vie (ADVD)</option>
                <option value="Employé Familial">Employé Familial</option>
            </select>
            <textarea id="profil" placeholder="Votre phrase d'accroche..." oninput="updateAll()"></textarea>
        </div>

        <div class="card">
            <label>🛠️ Compétences</label>
            <select id="list-comp" onchange="ajouterTag('compTech', 'list-comp')"></select>
            <div id="tags-tech"></div>
            <label style="margin-top:15px;">🤝 Qualités</label>
            <select id="list-hum" onchange="ajouterTag('compHum', 'list-hum')"></select>
            <div id="tags-hum"></div>
        </div>
        
        <button class="btn" onclick="window.print()">🖨️ Imprimer en PDF</button>
    </div>

    <div class="preview-side">
        <div id="cv-preview"></div>
    </div>
</div>

<div id="cv-print-only" class="no-screen"></div>

<script>
    let baseMetiers = {};
    const JSON_URL = 'competences_SPE_par_métier.json';
    let userData = { compTech: [], compHum: [], photo: "" };

    async function init() {
        try {
            const r = await fetch(JSON_URL + '?v=' + Date.now());
            baseMetiers = await r.json();
            console.log("JSON chargé");
        } catch (e) { console.error("Erreur JSON"); }
    }

    function changerMetier() {
        const m = document.getElementById('select-metier').value;
        const sTech = document.getElementById('list-comp');
        const sHum = document.getElementById('list-hum');
        
        sTech.innerHTML = '<option value="">-- Ajouter compétence --</option>';
        sHum.innerHTML = '<option value="">-- Ajouter qualité --</option>';
        userData.compTech = []; userData.compHum = [];

        if(m && baseMetiers[m]) {
            baseMetiers[m].Techniques.forEach(c => sTech.innerHTML += `<option value="${c}">${c}</option>`);
            baseMetiers[m].Humaines.forEach(h => sHum.innerHTML += `<option value="${h}">${h}</option>`);
        }
        renderTags(); updateAll();
    }

    function ajouterTag(type, id) {
        const val = document.getElementById(id).value;
        if(val && !userData[type].includes(val)) {
            userData[type].push(val);
            renderTags(); updateAll();
        }
    }

    function renderTags() {
        document.getElementById('tags-tech').innerHTML = userData.compTech.map(t => `<span class="tag">${t} <b onclick="userData.compTech=userData.compTech.filter(i=>i!=='${t}');renderTags();updateAll()">✕</b></span>`).join('');
        document.getElementById('tags-hum').innerHTML = userData.compHum.map(h => `<span class="tag">${h} <b onclick="userData.compHum=userData.compHum.filter(i=>i!=='${h}');renderTags();updateAll()">✕</b></span>`).join('');
    }

    function handlePhoto(e) {
        const reader = new FileReader();
        reader.onload = () => { userData.photo = reader.result; updateAll(); };
        reader.readAsDataURL(e.target.files[0]);
    }

    function updateAll() {
        const html = `
            <div style="display:flex; align-items:center; border-bottom:3px solid #3498db; padding-bottom:15px; margin-bottom:20px;">
                ${userData.photo ? `<img src="${userData.photo}" style="width:100px; height:100px; border-radius:50%; object-fit:cover; margin-right:25px; border:2px solid #3498db;">` : ''}
                <div>
                    <h1 style="margin:0; text-transform:uppercase;">${document.getElementById('nom').value || 'PRÉNOM NOM'}</h1>
                    <p style="margin:5px 0; color:#555;">✉️ ${document.getElementById('email').value} | 📞 ${document.getElementById('tel').value}</p>
                    <p style="margin:0; font-size:0.9em;">📍 ${document.getElementById('adresse').value}</p>
                </div>
            </div>
            <div style="background:#3498db; color:white; padding:8px 20px; display:inline-block; border-radius:4px; font-weight:bold; margin-bottom:20px;">${document.getElementById('select-metier').value || 'MÉTIER'}</div>
            <p style="font-style:italic; border-left:4px solid #3498db; padding-left:15px; margin-bottom:25px;">${document.getElementById('profil').value}</p>
            <h2 style="color:#3498db; border-bottom:1px solid #ddd;">Compétences Techniques</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">${userData.compTech.map(c => `<div>• ${c}</div>`).join('')}</div>
            <h2 style="color:#3498db; border-bottom:1px solid #ddd; margin-top:20px;">Qualités Humaines</h2>
            <div style="display:flex; flex-wrap:wrap; gap:10px;">${userData.compHum.map(h => `<span style="border:1px solid #ddd; padding:5px 10px; border-radius:5px;">${h}</span>`).join('')}</div>
        `;
        document.getElementById('cv-preview').innerHTML = html;
    }

    window.onload = init;
</script>
</body>
</html>
