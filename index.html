<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur CV SPE Professionnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #3498db; --bg: #f4f7f6; --dark: #2c3e50; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; gap: 20px; color: var(--dark); }
        .form-side { width: 40%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; }
        .preview-side { width: 60%; background: #525659; padding: 40px; display: flex; justify-content: center; overflow-y: auto; height: 90vh; border-radius: 8px; }
        #cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 15mm; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { font-size: 1.1em; color: var(--blue); border-bottom: 2px solid var(--blue); padding-bottom: 5px; margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn-save { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; margin-top: 10px; }
        .tag-container { margin-top: 5px; margin-bottom: 15px; min-height: 20px; }
        .tag { background: #e1f0fa; color: var(--blue); padding: 5px 12px; border-radius: 20px; font-size: 12px; margin: 3px; display: inline-flex; align-items: center; border: 1px solid var(--blue); font-weight: 600; }
        .tag b { margin-left: 8px; cursor: pointer; color: #e74c3c; }
        @media print { .no-print { display: none !important; } body { padding: 0; background: white; } .preview-side { background: white; padding: 0; width: 100%; overflow: visible; height: auto; } #cv-paper { box-shadow: none; margin: 0; transform: none; } }
    </style>
</head>
<body>

<div class="form-side no-print">
    <h1 style="font-size: 1.5em; margin-top:0;">Générateur CV SPE</h1>
    
    <label>👤 État Civil</label>
    <input type="text" id="nom" placeholder="PRÉNOM NOM" oninput="update()">
    <input type="text" id="tel" placeholder="Téléphone" oninput="update()">
    <input type="text" id="email" placeholder="Email" oninput="update()">
    <textarea id="adresse" placeholder="Adresse complète" oninput="update()"></textarea>

    <label>🎯 Métier visé</label>
    <select id="metier" onchange="loadSkills()">
        <option value="">-- Sélectionner le métier --</option>
        <option value="Garde d'enfants">Garde d'enfants (Assistant Parental)</option>
        <option value="ADVD">Assistant de Vie (ADVD)</option>
        <option value="Employé Familial">Employé Familial</option>
    </select>

    <label>🛠️ Compétences Techniques</label>
    <select id="selTech" onchange="addTag('tech', this)"></select>
    <div id="tagsTech" class="tag-container"></div>

    <label>🤝 Qualités</label>
    <select id="selHum" onchange="addTag('hum', this)"></select>
    <div id="tagsHum" class="tag-container"></div>

    <button class="btn-save" onclick="window.print()">🖨️ IMPRIMER / SAUVEGARDER PDF</button>
</div>

<div class="preview-side">
    <div id="cv-paper">
        </div>
</div>

<script>
    let repoData = {};
    let selectedSkills = { tech: [], hum: [] };
    // NOM DU FICHIER EXACT SANS ACCENT SUR MÉTIER
    const FILE_NAME = 'competences_SPE_par_metier.json';

    async function init() {
        try {
            // Ajout d'un paramètre aléatoire pour forcer GitHub à donner la version la plus récente
            const response = await fetch(FILE_NAME + '?v=' + Date.now());
            if(!response.ok) throw new Error();
            repoData = await response.json();
            console.log("Référentiel chargé avec succès !");
        } catch(e) { 
            console.error("Erreur de lien avec le fichier JSON");
            alert("Erreur : Impossible de lire le fichier " + FILE_NAME);
        }
    }

    function loadSkills() {
        const m = document.getElementById('metier').value;
        const sT = document.getElementById('selTech');
        const sH = document.getElementById('selHum');
        
        // On vide les sélections précédentes
        sT.innerHTML = sH.innerHTML = '<option value="">-- Ajouter une ligne --</option>';
        selectedSkills = { tech: [], hum: [] };
        
        if(m && repoData[m]) {
            repoData[m].Techniques.forEach(t => sT.innerHTML += `<option value="${t}">${t}</option>`);
            repoData[m].Humaines.forEach(h => sH.innerHTML += `<option value="${h}">${h}</option>`);
        }
        renderTags();
        update();
    }

    function addTag(type, el) {
        if(el.value && !selectedSkills[type].includes(el.value)) {
            selectedSkills[type].push(el.value);
            renderTags();
            update();
        }
        el.value = ""; // Reset du sélecteur
    }

    function renderTags() {
        document.getElementById('tagsTech').innerHTML = selectedSkills.tech.map(t => 
            `<span class="tag">${t}<b onclick="removeTag('tech','${t}')">✕</b></span>`).join('');
        document.getElementById('tagsHum').innerHTML = selectedSkills.hum.map(h => 
            `<span class="tag">${h}<b onclick="removeTag('hum','${h}')">✕</b></span>`).join('');
    }

    function removeTag(type, val) {
        selectedSkills[type] = selectedSkills[type].filter(item => item !== val);
        renderTags();
        update();
    }

    function update() {
        const paper = document.getElementById('cv-paper');
        const nom = document.getElementById('nom').value || 'PRÉNOM NOM';
        const metier = document.getElementById('metier').value || 'MÉTIER VISÉ';
        
        paper.innerHTML = `
            <div style="border-bottom:4px solid #3498db; padding-bottom:15px; margin-bottom:25px; display:flex; justify-content:space-between; align-items:flex-end;">
                <div>
                    <h1 style="margin:0; text-transform:uppercase; font-size:2.2em; color:#2c3e50;">${nom}</h1>
                    <p style="margin:5px 0; color:#555; font-weight:bold;">
                        ${document.getElementById('tel').value} ${document.getElementById('email').value ? ' | ' + document.getElementById('email').value : ''}
                    </p>
                    <p style="margin:0; font-size:0.9em; color:#777;">${document.getElementById('adresse').value}</p>
                </div>
            </div>

            <div style="background:#3498db; color:white; padding:10px 20px; display:inline-block; border-radius:4px; font-weight:bold; font-size:1.3em; margin-bottom:30px; text-transform:uppercase; letter-spacing:1px;">
                ${metier}
            </div>

            <h2 style="text-transform:uppercase; letter-spacing:1px;">Compétences Techniques</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:30px;">
                ${selectedSkills.tech.map(t => `<div style="padding:4px 0; border-bottom:1px solid #f0f0f0;">• ${t}</div>`).join('')}
            </div>

            <h2 style="text-transform:uppercase; letter-spacing:1px;">Qualités & Savoir-être</h2>
            <div style="display:flex; flex-wrap:wrap; gap:12px;">
                ${selectedSkills.hum.map(h => `<span style="border:1.5px solid #ddd; padding:7px 15px; border-radius:8px; font-size:0.95em; background:#fafafa;">${h}</span>`).join('')}
            </div>
        `;
    }

    window.onload = init;
</script>
</body>
</html>
